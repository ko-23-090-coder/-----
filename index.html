<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Монитор статусов</title>
</head>
<body>

<h2>Мой профиль</h2>
<div id="myInfo"></div>

<button onclick="changeStatus('Учусь', 'blue')">Учусь</button>
<button onclick="changeStatus('Кофе', 'brown')">Кофе</button>
<button onclick="changeStatus('В игре', 'green')">В игре</button>
<button onclick="changeStatus('Дома', 'gray')">Дома</button>

<h2>Монитор группы</h2>
<div id="grouplist"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// 🔴 ВСТАВЬ СВОИ ДАННЫЕ
const URL = 'https://fxizqmbaadnpzabrpvra.supabase.co';
const KEY = 'sb_publishable_lvVH1QsN5oTesoxu-VwLoQ_8hEMTNwx';

const supabase = createClient(URL, KEY);

// 🔴 ВСТАВЬ СВОЙ ID
const MY_ID = '3ab268d2-c6b5-43f9-97f6-6ce1897fcf70';

// смена статуса
window.changeStatus = async (text, color) => {
  const { error } = await supabase
    .from('profiles')
    .update({ status: text, color: color })
    .eq('id', MY_ID);

  if (error) {
    alert("Ошибка! Проверь RLS политики");
    console.error(error);
  } else {
    fetchGroup();
  }
};

// загрузка пользователей
async function fetchGroup() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true });

  if (error) return console.error(error);

  const list = document.getElementById('grouplist');

  list.innerHTML = data.map(user => `
    <div style="display:flex; gap:10px; margin:5px;">
      <div style="width:10px; height:10px; border-radius:50%; background:${user.color || '#ccc'}"></div>
      <div>
        <strong>${user.username}</strong><br>
        <small>${user.status || 'Статус не задан'}</small>
      </div>
    </div>
  `).join('');

  const me = data.find(u => u.id === MY_ID);

  if (me) {
    document.getElementById('myInfo').innerText =
      `Вы зашли как: ${me.username}`;
  }
}

// автообновление
fetchGroup();
setInterval(fetchGroup, 5000);

</script>

</body>
</html>
